    function spRand(a, b) { return Math.random() * (b - a) + a; }

    function drawSpParticle(ctx, p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1.5;
      const z = p.size;
      switch (p.shape) {
        case 'circle': ctx.beginPath(); ctx.arc(0,0,z,0,Math.PI*2); ctx.fill(); break;
        case 'square': ctx.fillRect(-z,-z,z*2,z*2); break;
        case 'triangle': ctx.beginPath(); ctx.moveTo(0,-z); ctx.lineTo(z,z); ctx.lineTo(-z,z); ctx.closePath(); ctx.fill(); break;
        case 'diamond': ctx.beginPath(); ctx.moveTo(0,-z*1.2); ctx.lineTo(z,0); ctx.lineTo(0,z*1.2); ctx.lineTo(-z,0); ctx.closePath(); ctx.fill(); break;
        case 'star':
          ctx.beginPath();
          for (let i=0;i<5;i++) { const a=Math.PI/2+i*Math.PI*2/5, b=a+Math.PI/5; ctx.lineTo(Math.cos(a)*z,Math.sin(a)*z); ctx.lineTo(Math.cos(b)*z*.4,Math.sin(b)*z*.4); }
          ctx.closePath(); ctx.fill(); break;
        case 'ring': ctx.beginPath(); ctx.arc(0,0,z,0,Math.PI*2); ctx.stroke(); break;
      }
      ctx.restore();
    }

    // Global particle system on a fixed canvas
    const spParticles = [];
    let spCanvas = null;
    let spCtx = null;
    let spRaf = null;

    function ensureSpCanvas() {
      if (spCanvas) return;
      spCanvas = document.createElement('canvas');
      spCanvas.className = 'sp-particle-canvas';
      document.body.appendChild(spCanvas);
      spCtx = spCanvas.getContext('2d');
      function resize() {
        const d = window.devicePixelRatio || 1;
        spCanvas.width = window.innerWidth * d;
        spCanvas.height = window.innerHeight * d;
        spCanvas.style.width = window.innerWidth + 'px';
        spCanvas.style.height = window.innerHeight + 'px';
        spCtx.setTransform(d,0,0,d,0,0);
      }
      resize();
      window.addEventListener('resize', resize);
    }

    function spEmit(cx, cy, count = 24) {
      ensureSpCanvas();
      for (let i = 0; i < count; i++) {
        const ang = spRand(0, Math.PI * 2), spd = spRand(2, 6);
        spParticles.push({
          x: cx, y: cy, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
          size: spRand(2, 5), color: SP_COLORS[Math.floor(spRand(0, SP_COLORS.length))],
          shape: SP_SHAPES[Math.floor(spRand(0, SP_SHAPES.length))],
          alpha: 1, rot: spRand(0, Math.PI*2), vr: spRand(-.08,.08),
          life: 1, decay: spRand(.012,.025), gravity: spRand(.03,.07),
        });
      }
      if (!spRaf) spRaf = requestAnimationFrame(spTick);
    }

    function spTick() {
      spCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      for (let i = spParticles.length - 1; i >= 0; i--) {
        const p = spParticles[i];
        p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= .99;
        p.rot += p.vr; p.life -= p.decay; p.alpha = Math.max(0, p.life);
        if (p.life <= 0) { spParticles.splice(i, 1); continue; }
        drawSpParticle(spCtx, p);
      }
      if (spParticles.length > 0) spRaf = requestAnimationFrame(spTick);
      else { spRaf = null; spCtx.clearRect(0, 0, window.innerWidth, window.innerHeight); }
    }

    function handleParticleClick(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      spEmit(rect.left + rect.width / 2, rect.top + rect.height / 2);
    }

    // ─── Utility: Token cost calculation (Sonnet pricing) ─────────
    // Claude Sonnet: $3/M input, $15/M output
    function formatTokenCost(usage) {
      if (!usage) return null;
      const inputCost = (usage.inputTokens / 1_000_000) * 3;
      const outputCost = (usage.outputTokens / 1_000_000) * 15;
      const totalCost = inputCost + outputCost;
      return {
        input: usage.inputTokens.toLocaleString(),
        output: usage.outputTokens.toLocaleString(),
        total: usage.totalTokens.toLocaleString(),
        cost: totalCost < 0.01 ? `<$0.01` : `$${totalCost.toFixed(2)}`,
      };
    }

    // ─── Utility: Relative time ────────────────────────────────────
    function timeAgo(date) {
      if (!date) return "";
      const s = Math.floor((Date.now() - date) / 1000);
      if (s < 10) return "just now";
      if (s < 60) return `${s}s ago`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    // ─── Utility: Fetch with retry + backoff ────────────────────────
    async function fetchWithRetry(url, options, maxRetries = 2) {
      for (let attempt = 0; attempt <= maxRetries; attempt++) {
        try {
          const res = await fetch(url, options);
          if (res.status === 429 && attempt < maxRetries) {
            await new Promise(r => setTimeout(r, 1000 * Math.pow(2, attempt)));
            continue;
          }
          return res;
        } catch (err) {
          if (attempt === maxRetries) throw err;
          await new Promise(r => setTimeout(r, 1000 * Math.pow(2, attempt)));
        }
      }
    }

    // ─── Score Ring Component ───────────────────────────────────────
    function ScoreRing({ score, size = 140, darkMode }) {
      const r = (size - 16) / 2;
      const circ = 2 * Math.PI * r;
      const targetOffset = circ - (score / 100) * circ;
      const [animOffset, setAnimOffset] = React.useState(circ);
      const [displayScore, setDisplayScore] = React.useState(0);
      const textMuted = darkMode ? "text-txt-muted" : "text-gray-400";

      React.useEffect(() => {
        // Animate ring stroke
        const raf = requestAnimationFrame(() => setAnimOffset(targetOffset));
        // Animate number count-up
        const duration = 1000;
        const start = performance.now();
        let frame;
        const tick = (now) => {
          const t = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
          setDisplayScore(Math.round(eased * score));
          if (t < 1) frame = requestAnimationFrame(tick);
        };
        frame = requestAnimationFrame(tick);
        return () => { cancelAnimationFrame(raf); cancelAnimationFrame(frame); };
      }, [score, circ, targetOffset]);

      return (
        <div className="relative" style={{ width: size, height: size }}>
          <svg width={size} height={size} className="-rotate-90">
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={darkMode ? "#272727" : "#e5e7eb"} strokeWidth="8" />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={getScoreRingColor(score)} strokeWidth="8" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={animOffset} style={{ transition: "stroke-dashoffset 1s cubic-bezier(0.22, 1, 0.36, 1)" }} />
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <span className={`text-3xl font-bold ${getScoreColor(score)}`}>{displayScore}</span>
            <span className={`text-xs ${textMuted}`}>/ 100</span>
          </div>
        </div>
      );
    }

                    <Clock size={12} className={t.textMuted} />
                    <div className="flex-1 min-w-0">
                      <p className={`text-xs ${t.textSecondary} truncate`}>{item.url}</p>
                      <p className={`text-xs ${t.textMuted}`}>{item.date}</p>
                    </div>
                    <span className={`text-xs font-bold ${getScoreColor(item.score)}`}>{item.score}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Main Component ──────────────────────────────────────────────
    function ContentChecker() {
      const [settings, setSettings] = useState(loadSettings);
      const darkMode = settings.darkMode;
      const t = useTheme(darkMode);

      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [view, setView] = useState("input");
      const [inputMode, setInputMode] = useState("url");
      const [urlValue, setUrlValue] = useState("");
      const [pasteValue, setPasteValue] = useState("");
      const [uploadedFileContent, setUploadedFileContent] = useState("");
      const [uploadedFileName, setUploadedFileName] = useState("");
      const [contentType, setContentType] = useState("Webpage");
      const [contentLabel, setContentLabel] = useState("");
      const [analysisMode, setAnalysisMode] = useState("full");
      const [persona, setPersona] = useState("cpo");
      const [docPanelOpen, setDocPanelOpen] = useState(false);
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [severityFilter, setSeverityFilter] = useState("all");
      const [categoryFilter, setCategoryFilter] = useState("all");
      const [analyzing, setAnalyzing] = useState(false);
      const [analyzeStep, setAnalyzeStep] = useState(0);
      const [analyzePhase, setAnalyzePhase] = useState("");
      const [expandedFindings, setExpandedFindings] = useState(new Set());
      const [error, setError] = useState(null);
      const [analysisResult, setAnalysisResult] = useState(null);
      const [analyzedLabel, setAnalyzedLabel] = useState("");
      const [analyzedAt, setAnalyzedAt] = useState(null);
      const [history, setHistory] = useState(loadHistory);
      const [isDragging, setIsDragging] = useState(false);
      const [toast, setToast] = useState({ message: "", visible: false });
      const toastTimer = useRef(null);

      const showToast = useCallback((message) => {
        clearTimeout(toastTimer.current);
        setToast({ message, visible: true });
        toastTimer.current = setTimeout(() => {
          setToast(t => ({ ...t, visible: false }));
          setTimeout(() => setToast({ message: "", visible: false }), 300);
        }, 1800);
      }, []);
      const fileInputRef = useRef(null);

      // ─── Settings persistence ────────────────
      const updateSettings = useCallback((next) => {
        setSettings(next);
        saveSettings(next);
      }, []);

      // ─── Tick relative time every 30s ─────────
      const [, setTick] = useState(0);
      useEffect(() => {
        if (!analyzedAt) return;
        const id = setInterval(() => setTick(t => t + 1), 30000);
        return () => clearInterval(id);
      }, [analyzedAt]);

      // ─── Escape key closes modals ────────────
      useEffect(() => {
        const handler = (e) => {
          if (e.key === "Escape") {
            if (settingsOpen) setSettingsOpen(false);
            else if (docPanelOpen) setDocPanelOpen(false);
          }
        };
        document.addEventListener("keydown", handler);
        return () => document.removeEventListener("keydown", handler);
      }, [settingsOpen, docPanelOpen]);

      // ─── Auto-expand critical findings ───────
      useEffect(() => {
        if (settings.autoExpandCritical && analysisResult?.findings) {
          const criticalIds = new Set(
            analysisResult.findings.filter(f => f.severity === "critical").map(f => f.id)
          );
          setExpandedFindings(criticalIds);
        }
      }, [analysisResult, settings.autoExpandCritical]);

      // Derived
      const findings = analysisResult?.findings || [];
      const dimensions = analysisResult?.dimensions || [];
      const terms = analysisResult?.terms || { approved: [], forbidden: [] };
      const overallScore = analysisResult?.overallScore || 0;
      const criticalCount = findings.filter(f => f.severity === "critical").length;
      const warningCount = findings.filter(f => f.severity === "warning").length;
      const suggestionCount = findings.filter(f => f.severity === "suggestion").length;

      const filteredFindings = useMemo(() => findings.filter(f => {
        if (severityFilter !== "all" && f.severity !== severityFilter) return false;
        if (categoryFilter !== "all" && f.category !== categoryFilter) return false;
        return true;
      }), [findings, severityFilter, categoryFilter]);

      const categories = useMemo(() => [...new Set(findings.map(f => f.category))], [findings]);

      const toggleFinding = useCallback((id) => {
        setExpandedFindings(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      }, []);

      // ─── File Upload + Drag & Drop ────────────
      const handleFileUpload = useCallback((file) => {
        if (!file) return;
        setUploadedFileName(file.name);
        const reader = new FileReader();
        reader.onload = (ev) => {
          let text = ev.target.result;
          if (file.name.endsWith(".html") || file.name.endsWith(".htm")) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, "text/html");
            text = doc.body.textContent || "";
          }
          setUploadedFileContent(text);
        };
        reader.readAsText(file);
      }, []);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        setIsDragging(false);
        const file = e.dataTransfer.files?.[0];
        if (file) {
          setInputMode("upload");
          handleFileUpload(file);
        }
      }, [handleFileUpload]);

      const handleDragOver = useCallback((e) => {
        e.preventDefault();
        setIsDragging(true);
      }, []);

      const handleDragLeave = useCallback((e) => {
        e.preventDefault();
        setIsDragging(false);
      }, []);

      // ─── Analysis Handler ─────────────────────
      const handleAnalyze = useCallback(async (urlOverride) => {
        setAnalyzing(true);
        setError(null);
        setAnalyzeStep(0);
        setAnalyzePhase("Preparing analysis...");

        try {
          let content = "";
          let sourceUrl = null;
          let label = "";

          if (inputMode === "url") {
            let url = (typeof urlOverride === "string" ? urlOverride : null) || urlValue.trim();
            if (!url) throw new Error("Please enter a URL");
            // Auto-prepend https:// if missing a protocol
            if (!/^https?:\/\//i.test(url)) {
              url = "https://" + url;
            }
            sourceUrl = url;
            label = sourceUrl.replace("https://", "");

            setAnalyzeStep(0);
            setAnalyzePhase("Fetching page content...");
            const extractRes = await fetchWithRetry(`${WORKER_URL}/extract`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ url: sourceUrl }),
            });
            if (!extractRes.ok) {
              const err = await extractRes.json().catch(() => ({}));
              throw new Error(err.error || `Failed to extract content (${extractRes.status})`);
            }
            const extracted = await extractRes.json();
            content = extracted.content;
            if (!content) throw new Error("No content could be extracted from this URL");
          } else if (inputMode === "paste") {
            if (!pasteValue.trim()) throw new Error("Please paste some content");
            content = pasteValue;
            label = contentLabel || "Pasted content";
          } else if (inputMode === "upload") {
            if (!uploadedFileContent) throw new Error("Please upload a file first");
            content = uploadedFileContent;
            label = uploadedFileName;
          }

          setAnalyzeStep(1);
          setAnalyzePhase("Loading brand guidelines...");
          await new Promise(r => setTimeout(r, 300));

          setAnalyzeStep(2);
          setAnalyzePhase("Claude is analyzing against your framework...");
          const analyzePayload = {
            content,
            contentType,
            sourceUrl,
            mode: analysisMode,
          };
          if (analysisMode === "persona") {
            analyzePayload.persona = persona;
          }

          const analyzeRes = await fetchWithRetry(`${WORKER_URL}/analyze`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(analyzePayload),
          });

          if (!analyzeRes.ok) {
            const err = await analyzeRes.json().catch(() => ({}));
            throw new Error(err.error || `Analysis failed (${analyzeRes.status})`);
          }

          setAnalyzeStep(3);
          setAnalyzePhase("Scoring and formatting results...");
          const result = await analyzeRes.json();
          await new Promise(r => setTimeout(r, 400));

          setAnalysisResult(result);
          setAnalyzedLabel(label);
          setAnalyzedAt(Date.now());
          setExpandedFindings(new Set());
          setSeverityFilter("all");
          setCategoryFilter("all");
          setView("dashboard");

          const entry = {
            url: label,
            date: new Date().toLocaleString(),
            score: result.overallScore,
            mode: analysisMode,
          };
          const updated = [entry, ...history].slice(0, 20);
          setHistory(updated);
          saveHistory(updated);
        } catch (err) {
          setError(err.message);
        } finally {
          setAnalyzing(false);
          setAnalyzePhase("");
        }
      }, [inputMode, urlValue, pasteValue, contentLabel, uploadedFileContent, uploadedFileName, contentType, analysisMode, persona, history]);

      // Quick analyze
      const [pendingQuickUrl, setPendingQuickUrl] = useState(null);
      const handleQuickAnalyze = useCallback((url) => {
        setUrlValue(url);
        setInputMode("url");
        setPendingQuickUrl(url);
      }, []);

      useEffect(() => {
        if (pendingQuickUrl) {
          setPendingQuickUrl(null);
          handleAnalyze(pendingQuickUrl);
        }
      }, [pendingQuickUrl]);

      const clearHistory = useCallback(() => {
        setHistory([]);
        saveHistory([]);
      }, []);

      // ─── Export JSON ──────────────────────────
      const exportJSON = useCallback(() => {
        if (!analysisResult) return;
        const blob = new Blob([JSON.stringify(analysisResult, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `content-checker-audit-${analyzedLabel.replace(/[^a-z0-9]/gi, "-")}-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("JSON exported");
      }, [analysisResult, analyzedLabel, showToast]);

      const copySummary = useCallback(() => {
        const lines = [
          `Content Checker Audit: ${analyzedLabel}`,
          `Score: ${overallScore}/100`,
          `Mode: ${analysisResult?.mode || "full"}`,
          "",
          ...findings.map(f => `[${f.severity.toUpperCase()}] ${f.category}: ${f.text}\n  ${f.suggestion}`),
        ];
        navigator.clipboard.writeText(lines.join("\n"));
        showToast("Summary copied");
      }, [analyzedLabel, overallScore, analysisResult, findings]);

      // ─── Render ───────────────────────────────
      return (
        <div className={`${t.bg} min-h-screen flex flex-col`} style={{ fontFamily: "'Figtree', 'Inter', sans-serif" }}
          onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}>
          <ErrorBanner error={error} onDismiss={() => setError(null)} onRetry={() => { setError(null); handleAnalyze(); }} />

          {/* Header */}
          <header className={`h-14 border-b ${t.borderColor} ${t.cardBg} flex items-center justify-between px-4 flex-shrink-0 z-30`}>
            <div className="flex items-center gap-3">
              <button onClick={() => setSidebarOpen(!sidebarOpen)} className={`p-1.5 rounded-lg ${t.hoverBg} ${t.textMuted} transition-colors`}>
                <Menu size={18} />
              </button>
              <div className="flex items-center gap-2">
                <SpPlus size={24} />
                <span className={`text-sm font-bold ${t.textPrimary}`}>Content Checker</span>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={() => setDocPanelOpen(true)}
                className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs ${t.inputBg} border ${t.inputBorder} ${t.textSecondary} ${t.hoverBg} transition-colors`}>
                <BookOpen size={14} />
                <span className="hidden sm:inline">Guidelines</span>
              </button>
              <button onClick={() => updateSettings({ ...settings, darkMode: !darkMode })}
                className={`p-2 rounded-lg ${t.hoverBg} ${t.textMuted} transition-colors`}>
                {darkMode ? <Sun size={16} /> : <Moon size={16} />}
              </button>
              <button onClick={() => setSettingsOpen(true)}
                className={`p-2 rounded-lg ${t.hoverBg} ${t.textMuted} transition-colors`}>
                <Settings size={16} />
              </button>
            </div>
          </header>

          {/* Body */}
          <div className="flex flex-1 overflow-hidden">
            <Sidebar open={sidebarOpen} history={history} onQuickAnalyze={handleQuickAnalyze} onDocPanel={() => setDocPanelOpen(true)} onClearHistory={clearHistory} onNewAnalysis={() => setView("input")} showNewAnalysis={view !== "input"} darkMode={darkMode} />

            <main className="flex-1 overflow-y-auto p-4 md:p-6">
              {view === "input" ? (
                /* ─── Input View ─── */
                <div className="max-w-3xl mx-auto space-y-6">
                  <div className="text-center pt-6 pb-2">
                    <h1 className={`text-2xl font-bold ${t.textPrimary}`}>Analyze Content</h1>
                    <p className={`${t.textSecondary} mt-1`}>Check any content against your messaging framework</p>
                  </div>

                  {/* Analysis Mode Selector */}
                  <div className="grid grid-cols-3 md:grid-cols-6 gap-2">
                    {ANALYSIS_MODES.map(mode => (
                      <button key={mode.id} onClick={() => setAnalysisMode(mode.id)}
                        className={`p-3 rounded-xl border text-center transition-all ${analysisMode === mode.id
                          ? `border-brand-blue/50 ${darkMode ? "bg-brand-blue/10" : "bg-brand-blue/5"}`
                          : `${t.borderColor} ${t.cardBg} ${t.hoverBg}`}`}>
                        <mode.icon size={18} className={`mx-auto mb-1.5 ${analysisMode === mode.id ? "text-brand-blue" : t.textMuted}`} />
                        <p className={`text-xs font-medium ${analysisMode === mode.id ? "text-brand-blue" : t.textSecondary}`}>{mode.label}</p>
                      </button>
                    ))}
                  </div>

                  {/* Persona Selector (only when persona mode is selected) */}
                  {analysisMode === "persona" && (
                    <div className={`${t.cardBg} border ${t.borderColor} rounded-xl p-4 ${darkMode ? "card-elevated" : ""}`}>
                      <div className="flex items-center gap-2 mb-3">
                        <User size={14} className="text-brand-blue" />
                        <p className={`text-xs font-medium ${t.textMuted} uppercase tracking-wider`}>Select Persona</p>
                      </div>
                      <div className="grid grid-cols-3 gap-2">
                        {PERSONAS.map(p => (
                          <button key={p.id} onClick={() => setPersona(p.id)}
                            className={`p-3 rounded-lg border text-left transition-all ${persona === p.id
                              ? `border-brand-blue/50 ${darkMode ? "bg-brand-blue/10" : "bg-brand-blue/5"}`
                              : `${t.borderColor} ${t.hoverBg}`}`}>
                            <p className={`text-sm font-semibold ${persona === p.id ? "text-brand-blue" : t.textPrimary}`}>{p.label}</p>
                            <p className={`text-xs ${t.textMuted} mt-0.5`}>{p.desc}</p>
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Input Mode Tabs */}
                  <div className={`${t.cardBg} border ${t.borderColor} rounded-2xl overflow-hidden ${darkMode ? "card-elevated" : ""}`}>
                    <div className={`flex border-b ${t.borderColor}`}>
                      {[
                        { id: "url", label: "URL / Link", icon: Link },
                        { id: "upload", label: "Upload File", icon: Upload },
                        { id: "paste", label: "Paste Text", icon: Clipboard },
                      ].map(tab => (
                        <button key={tab.id} onClick={() => setInputMode(tab.id)}
                          className={`flex-1 flex items-center justify-center gap-2 px-4 py-3.5 text-sm font-medium transition-colors ${
                            inputMode === tab.id
                              ? `${darkMode ? "bg-surface-2" : "bg-gray-100"} ${t.textPrimary} border-b-2 border-brand-blue`
                              : `${t.textMuted} ${t.hoverBg}`}`}>
                          <tab.icon size={16} />
                          {tab.label}
                        </button>
                      ))}
                    </div>

                    <div className={`px-6 pt-4 pb-2 flex items-center gap-3 border-b ${t.borderColor}`}>
                      <span className={`text-xs ${t.textMuted}`}>Content type</span>
                      <select value={contentType} onChange={e => setContentType(e.target.value)}
                        className={`px-2.5 py-1.5 rounded-lg text-xs ${t.inputBg} border ${t.inputBorder} ${t.textPrimary} focus:outline-none`}>
                        {CONTENT_TYPES.map(ct => <option key={ct} value={ct}>{ct}</option>)}
                      </select>
                    </div>

                    <div className="p-6">
                      {inputMode === "url" && (
                        <div className="space-y-4">
                          <div className="relative">
                            <Globe size={18} className={`absolute left-4 top-1/2 -translate-y-1/2 ${t.textMuted}`} />
                            <input
                              type="text" value={urlValue} onChange={e => setUrlValue(e.target.value)}
                              onKeyDown={e => e.key === "Enter" && handleAnalyze()}
                              placeholder="Paste URL — webpage, Google Doc, Sheet, Slides, or Figma link..."
                              className={`w-full pl-11 pr-4 py-3.5 rounded-xl ${t.inputBg} border ${t.inputBorder} ${t.textPrimary} text-sm focus:outline-none focus:ring-2 focus:ring-brand-blue/40 focus:border-brand-blue/40`}
                            />
                          </div>
                          <div className="flex flex-wrap gap-1.5">
                            {["Google Docs", "Google Sheets", "Google Slides", "Figma", "Webpage"].map(type => (
                              <span key={type} className={`text-xs px-2.5 py-1 rounded-full ${darkMode ? "bg-surface-2 text-txt-muted" : "bg-gray-100 text-gray-400"}`}>
                                {type} {"\u2713"}
                              </span>
                            ))}
                          </div>
                        </div>
                      )}

                      {inputMode === "upload" && (
                        <div className="space-y-4">
                          <button onClick={() => fileInputRef.current?.click()}
                            className={`w-full border-2 border-dashed ${t.borderColor} rounded-xl p-10 text-center ${t.hoverBg} transition-colors group ${isDragging ? "drop-active" : ""}`}>
                            <FileUp size={32} className={`mx-auto mb-3 ${t.textMuted} group-hover:text-brand-blue transition-colors ${isDragging ? "text-brand-blue" : ""}`} />
                            {uploadedFileName ? (
                              <>
                                <p className={`text-sm font-medium ${t.textPrimary}`}>{uploadedFileName}</p>
                                <p className={`text-xs ${t.textMuted} mt-1`}>{uploadedFileContent.length} characters loaded</p>
                              </>
                            ) : (
                              <>
                                <p className={`text-sm font-medium ${t.textPrimary}`}>{isDragging ? "Drop file here" : "Drop files here or click to browse"}</p>
                                <p className={`text-xs ${t.textMuted} mt-1`}>.md, .txt, .html, .csv</p>
                              </>
                            )}
                          </button>
                          <input ref={fileInputRef} type="file" className="hidden" accept=".md,.txt,.html,.csv" onChange={e => handleFileUpload(e.target.files?.[0])} />
                        </div>
                      )}

                      {inputMode === "paste" && (
                        <div className="space-y-4">
                          <input type="text" value={contentLabel} onChange={e => setContentLabel(e.target.value)}
                            placeholder="Label (e.g. 'Homepage hero draft v2')"
                            className={`w-full px-3 py-2 rounded-lg ${t.inputBg} border ${t.inputBorder} ${t.textPrimary} text-sm focus:outline-none`} />
                          <textarea value={pasteValue} onChange={e => setPasteValue(e.target.value)}
                            placeholder="Paste your content here..."
                            rows={8}
                            className={`w-full px-4 py-3 rounded-xl ${t.inputBg} border ${t.inputBorder} ${t.textPrimary} text-sm focus:outline-none focus:ring-2 focus:ring-brand-blue/40 resize-none`} />
                          <div className="flex justify-between">
                            <span className={`text-xs ${t.textMuted}`}>{pasteValue.length} characters {"\u00B7"} {pasteValue.split(/\s+/).filter(Boolean).length} words</span>
                            <button onClick={() => navigator.clipboard.readText().then(text => setPasteValue(text)).catch(() => {})}
                              className={`text-xs flex items-center gap-1 ${t.textMuted} hover:text-brand-blue transition-colors`}>
                              <Clipboard size={12} /> Paste from clipboard
                            </button>
                          </div>
                        </div>
                      )}
                    </div>

                    <div className="px-6 pb-6">
                      <button onClick={withParticles(() => handleAnalyze())}
                        className="w-full btn-primary text-white font-medium text-sm flex items-center justify-center gap-2" style={{ height: 44, letterSpacing: "0.01em" }}>
                        <Play size={16} />
                        Run Analysis
                      </button>
                    </div>
                  </div>
                </div>
              ) : (
                /* ─── Dashboard View ─── */
                <div className="space-y-6">
                  <div className="flex items-center justify-between flex-wrap gap-3">
                    <div>
                      <div className="flex items-center gap-2">
                        <button onClick={() => setView("input")} className={`${t.textMuted} hover:text-brand-blue transition-colors`}>
                          <ChevronLeft size={18} />
                        </button>
                        <h2 className={`text-lg font-semibold ${t.textPrimary}`}>{analyzedLabel || "Analysis"}</h2>
                      </div>
                      <p className={`text-sm ${t.textMuted} ml-6`}>
                        {contentType} {"\u00B7"} {analysisResult?.mode || "full"} audit{analysisResult?.mode === "persona" ? ` (${persona.toUpperCase()})` : ""} {"\u00B7"} {timeAgo(analyzedAt)}
                        {analysisResult?.usage && (() => {
                          const tc = formatTokenCost(analysisResult.usage);
                          return tc ? <>{" \u00B7 "}<span title={`Input: ${tc.input} \u00B7 Output: ${tc.output}`}>{tc.total} tokens ({tc.cost})</span></> : null;
                        })()}
                      </p>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={withParticles(exportJSON)} className={`px-3 py-2 rounded-lg text-xs flex items-center gap-1.5 ${t.inputBg} ${t.textSecondary} ${t.hoverBg} border ${t.inputBorder}`}>
                        <Download size={14} /> Export JSON
                      </button>
                      <button onClick={withParticles(copySummary)} className={`px-3 py-2 rounded-lg text-xs flex items-center gap-1.5 ${t.inputBg} ${t.textSecondary} ${t.hoverBg} border ${t.inputBorder}`}>
                        <Copy size={14} /> Copy Summary
                      </button>
                      <button onClick={withParticles(() => setView("input"))} className="px-3 py-2 rounded-lg text-xs flex items-center gap-1.5 btn-primary text-white">
                        <RefreshCw size={14} /> New Analysis
                      </button>
                    </div>
                  </div>

                  {/* Score + Radar */}
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div className={`${t.cardBg} border ${t.borderColor} rounded-2xl p-6 flex flex-col items-center justify-center ${darkMode ? "card-elevated" : ""}`}>
                      <ScoreRing score={overallScore} darkMode={darkMode} />
                      <p className={`text-sm font-medium ${t.textPrimary} mt-4`}>Overall Compliance</p>
                      <p className={`text-xs ${t.textMuted} mt-1`}>Based on {findings.length} findings</p>
                    </div>

                    <div className={`${t.cardBg} border ${t.borderColor} rounded-2xl p-6 ${darkMode ? "card-elevated" : ""}`}>
                      <p className={`text-xs font-medium ${t.textMuted} uppercase tracking-wider mb-4`}>Dimension Scores</p>
                      {RechartsOK && dimensions.length > 0 ? (
                        <RC.ResponsiveContainer width="100%" height={200}>
                          <RC.RadarChart data={dimensions}>
                            <RC.PolarGrid stroke={darkMode ? "#272727" : "#e5e7eb"} />
                            <RC.PolarAngleAxis dataKey="dimension" tick={{ fill: darkMode ? "#A0A1A3" : "#717275", fontSize: 12 }} />
                            <RC.PolarRadiusAxis tick={false} axisLine={false} domain={[0, 100]} />
                            <RC.Radar dataKey="score" stroke="#3B41EC" fill="#3B41EC" fillOpacity={0.15} strokeWidth={2} />
                          </RC.RadarChart>
                        </RC.ResponsiveContainer>
                      ) : (
                        <div style={{height: 200}} className="flex items-center justify-center">
                          <div className="space-y-2 w-full">
                            {dimensions.map((d, i) => (
                              <div key={i} className="flex items-center gap-3 text-sm">
                                <span className={`w-24 text-right text-xs ${t.textMuted}`}>{d.dimension}</span>
                                <div className={`flex-1 h-2 rounded-full ${darkMode ? "bg-surface-2" : "bg-gray-200"}`}>
                                  <div className="h-2 rounded-full bg-brand-blue/50" style={{ width: `${d.score}%` }} />
                                </div>
                                <span className={`w-8 text-xs ${t.textMuted}`}>{d.score}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>

                    <div className={`${t.cardBg} border ${t.borderColor} rounded-2xl p-6 space-y-4 ${darkMode ? "card-elevated" : ""}`}>
                      <p className={`text-xs font-medium ${t.textMuted} uppercase tracking-wider`}>Issue Breakdown</p>
                      {[
                        { label: "Critical", count: criticalCount, config: SEVERITY_CONFIG.critical, filter: "critical" },
                        { label: "Warnings", count: warningCount, config: SEVERITY_CONFIG.warning, filter: "warning" },
                        { label: "Suggestions", count: suggestionCount, config: SEVERITY_CONFIG.suggestion, filter: "suggestion" },
                      ].map(item => (
                        <button key={item.label} onClick={() => setSeverityFilter(severityFilter === item.filter ? "all" : item.filter)}
                          className={`w-full flex items-center justify-between p-3 rounded-xl ${item.config.bg} border ${item.config.border} transition-colors hover:opacity-80`}>
                          <div className="flex items-center gap-3">
                            <item.config.icon size={18} className={item.config.text} />
                            <span className={`text-sm font-medium ${item.config.text}`}>{item.label}</span>
                          </div>
                          <span className={`text-2xl font-bold ${item.config.text}`}>{item.count}</span>
                        </button>
                      ))}
                      <div className={`pt-2 border-t ${t.borderColor}`}>
                        <div className="flex items-center justify-between">
                          <span className={`text-xs ${t.textMuted}`}>Approved terms found</span>
                          <span className="text-sm font-medium text-status-green">{terms.approved.filter(x => x.found).length}/{terms.approved.length}</span>
                        </div>
                        <div className="flex items-center justify-between mt-1">
                          <span className={`text-xs ${t.textMuted}`}>Forbidden terms found</span>
                          <span className="text-sm font-medium text-status-red">{terms.forbidden.filter(x => x.found).length}</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* View Tabs */}
                  <div className={`flex items-center gap-1 p-1 rounded-xl ${t.inputBg} w-fit`}>
                    {[
                      { id: "dashboard", icon: List, label: "Findings" },
                      { id: "sidebyside", icon: Columns, label: "Side by Side" },
                      { id: "heatmap", icon: Grid3X3, label: "Terminology" },
                    ].map(tab => (
                      <button key={tab.id} onClick={() => setView(tab.id)}
                        className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-medium transition-colors ${
                          view === tab.id
                            ? `${t.cardBg} ${t.textPrimary} shadow-sm`
                            : `${t.textMuted} ${t.hoverBg}`}`}>
                        <tab.icon size={14} />
                        {tab.label}
                      </button>
                    ))}
                  </div>

                  {/* Findings Tab */}
                  {view === "dashboard" && (
                    <>
                      <div className="flex items-center gap-2 flex-wrap">
                        <Filter size={14} className={t.textMuted} />
                        <select value={severityFilter} onChange={e => setSeverityFilter(e.target.value)}
                          className={`px-2.5 py-1.5 rounded-lg text-xs ${t.inputBg} border ${t.inputBorder} ${t.textSecondary}`}>
                          <option value="all">All severities</option>
                          <option value="critical">Critical</option>
                          <option value="warning">Warning</option>
                          <option value="suggestion">Suggestion</option>
                        </select>
                        <select value={categoryFilter} onChange={e => setCategoryFilter(e.target.value)}
                          className={`px-2.5 py-1.5 rounded-lg text-xs ${t.inputBg} border ${t.inputBorder} ${t.textSecondary}`}>
                          <option value="all">All categories</option>
                          {categories.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        <span className={`text-xs ${t.textMuted}`}>{filteredFindings.length} findings</span>
                      </div>
                      <div className="space-y-3">
                        {filteredFindings.map(f => (
                          <FindingCard key={f.id} finding={f} expanded={expandedFindings.has(f.id)}
                            onToggle={() => toggleFinding(f.id)} darkMode={darkMode}
                            showSuggestions={settings.showSuggestions} showDocRefs={settings.showDocRefs} onCopy={showToast} />
                        ))}
                        {filteredFindings.length === 0 && (
                          <div className={`text-center py-12 ${t.textMuted}`}>
                            <CheckCircle size={32} className="mx-auto mb-3 text-status-green" />
                            <p className="text-sm">No findings match your filters</p>
                          </div>
                        )}
                      </div>
                    </>
                  )}

                  {/* Side by Side Tab */}
                  {view === "sidebyside" && <DiffView findings={findings} darkMode={darkMode} onCopy={showToast} />}

                  {/* Terminology Heatmap Tab */}
                  {view === "heatmap" && (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                      <div className={`${t.cardBg} border ${t.borderColor} rounded-2xl p-6 ${darkMode ? "card-elevated" : ""}`}>
                        <div className="flex items-center gap-2 mb-4">
                          <CheckCircle size={16} className="text-status-green" />
                          <h3 className={`text-sm font-semibold ${t.textPrimary}`}>Approved Terms</h3>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {terms.approved.map(x => (
                            <span key={x.term} className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors cursor-default ${
                              x.found
                                ? "bg-status-green/10 border-status-green/30 text-status-green"
                                : `${darkMode ? "bg-surface-2 border-bdark-hover text-txt-muted" : "bg-gray-100 border-gray-200 text-gray-400"}`}`}>
                              {x.term} {x.found ? `(${x.count})` : "\u2014"}
                            </span>
                          ))}
                          {terms.approved.length === 0 && <span className={`text-xs ${t.textMuted}`}>No terminology data</span>}
                        </div>
                        <p className={`text-xs ${t.textMuted} mt-4`}>
                          {terms.approved.filter(x => x.found).length} of {terms.approved.length} approved terms found. Gray terms are missing.
                        </p>
                      </div>
                      <div className={`${t.cardBg} border ${t.borderColor} rounded-2xl p-6 ${darkMode ? "card-elevated" : ""}`}>
                        <div className="flex items-center gap-2 mb-4">
                          <AlertCircle size={16} className="text-status-red" />
                          <h3 className={`text-sm font-semibold ${t.textPrimary}`}>Forbidden Terms</h3>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {terms.forbidden.map(x => (
                            <span key={x.term} className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors cursor-default ${
                              x.found
                                ? "bg-status-red/10 border-status-red/30 text-status-red"
                                : "bg-status-green/10 border-status-green/30 text-status-green"}`}>
                              {x.found ? "\u26A0 " : "\u2713 "}{x.term} {x.found ? `(${x.count})` : ""}
                            </span>
                          ))}
                          {terms.forbidden.length === 0 && <span className={`text-xs ${t.textMuted}`}>No terminology data</span>}
                        </div>
                        <p className={`text-xs ${t.textMuted} mt-4`}>
                          {terms.forbidden.filter(x => x.found).length} forbidden terms detected. Green terms are correctly absent.
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </main>
          </div>

          {/* Doc Panel Overlay */}
          {docPanelOpen && <div className="fixed inset-0 z-30 bg-black/40" onClick={() => setDocPanelOpen(false)} />}
          <DocPanel open={docPanelOpen} onClose={() => setDocPanelOpen(false)} darkMode={darkMode} />

          {/* Settings Modal */}
          {settingsOpen && <SettingsModal settings={settings} onUpdate={updateSettings} onClose={() => setSettingsOpen(false)} darkMode={darkMode} />}

          {/* Analyzing Overlay */}
          {analyzing && <AnalyzingOverlay analyzeStep={analyzeStep} analyzePhase={analyzePhase} darkMode={darkMode} />}

          {/* Toast */}
          <Toast message={toast.message} visible={toast.visible} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ContentChecker />);
  </script>
</body>
</html>
