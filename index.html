            <div className={`space-y-4 text-sm ${textSecondary}`}>

              <div className="p-3 rounded-lg bg-amber-500/5 border border-amber-500/15">

            </div>

            <button key={i} className={`w-full text-left px-3 py-2 rounded-lg text-xs ${textSecondary} ${hoverBg} transition-colors flex items-center gap-2`}>
              <ChevronRight size={12} className={textMuted} />
              {section}
            </button>
          ))}
        </div>
      </div>
    </div>

  // ─── Sidebar ───────────────────────────────
  const Sidebar = () => (

        {/* Messaging Doc */}
        <div className="mb-6">
          <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider mb-2`}>Source of Truth</p>
          <button onClick={() => setDocPanelOpen(true)}
            className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl ${inputBg} border ${inputBorder} ${hoverBg} transition-colors text-left`}>
            <FileText size={16} className="text-violet-400 flex-shrink-0" />
            <div className="min-w-0 flex-1">
              <p className={`text-xs font-medium ${textPrimary} truncate`}>{messagingDoc.name}</p>

          <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider mb-2`}>Quick Check</p>

            {QUICK_PAGES.slice(0, 6).map(page => (
              <button key={page.url} onClick={() => { handleQuickPage(page.url); setView("input"); }}
                className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left ${hoverBg} transition-colors`}>

                <span className={`text-xs ${textSecondary}`}>{page.label}</span>
                <ExternalLink size={10} className={`${textMuted} ml-auto opacity-0 group-hover:opacity-100`} />

        </div>

        {/* History */}
        <div>
          <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider mb-2`}>Recent</p>

            {history.map((item, i) => (
              <button key={i} onClick={() => setView("dashboard")}
                className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left ${hoverBg} transition-colors`}>
                <Clock size={12} className={textMuted} />

                  <p className={`text-xs ${textSecondary} truncate`}>{item.url.replace("https://", "")}</p>

    ReactDOM.createRoot(document.getElementById('root')).render(<Lighthouse />);
